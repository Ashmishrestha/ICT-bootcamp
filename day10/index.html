<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
</head>
<body>
    <h1>Variables</h1>
    <h2>Javascript Numbers</h2>
    <p>Number can be written with or without decimals.example is given below.</p>
    <p id="demo"></p>

    <h1>Javascript syntax</h1>
    <p>The let and context keyword create variables</p>
    <p id="demo2"></p>

    <h2>Summation Example</h2>
    <p>The Sum is:</p>
    <p id="sum"></p>p


    <script>
        document.getElementById("demo").innerHTML="the number with decimal is 10.5";

        let x=5;
        const fname="Ram"
        document.getElementById("demo2").innerHTML=fname +" is "+ x +" year old."

        let y=10;
        let sum = x + y;
        document.getElementById("sum").innerHTML=sum;
    </script>
</body>
</html>
