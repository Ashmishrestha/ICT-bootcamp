<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container {
            display: grid;
            grid-template-areas:
            "header header"
            "menu content"
            "Footer Footer";

            grid-template-columns: 1fr 3fr;
            background-color: rgb(2, 2, 102);
            padding: 5px;
            gap:3px; 
        }
        .container div {
            background-color: rgb(217, 217, 236);
            padding: 10px;

        }
        .container div.header{
             grid-area: header;
             text-align: center;
        }
        .container div.menu {
            grid-area: menu;
        }
        .container div.content {
            grid-area: content;
        }
        .container div.Footer {
            grid-area: Footer;
            text-align: center;
        }
        
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout</title>
</head>
<body>
    <h1>CSS Grid layout</h1>

    <p>The Grid layout module offers a grid-basic layout system,with rows and columns.</p>

    <p>The Grid layout module makes it easy to design complex and responsive web pages without using floats and positioning.</p>

    <div class="container">
    <div class="header">My Header </div>
    <div class="menu">
        <a href="#">Link 1 </a><br>
        <a href="#">Link 2</a><br>
        <a href="#">Link 3</a></div>

    <div class="content">
        <h3>Lorium Ipsum</h3>
        <p>This is paragraph</p>
    </div>

    <div class="Footer">
        <h4>Footer</h4>
    </div>
    
</body>
</html>
