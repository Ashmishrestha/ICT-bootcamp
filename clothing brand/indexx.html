<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop</title>
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>ASHMI'S Clothing Brand</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to My Store</h2>
        <p>Best products at affordable prices</p><br><br>
        <button>Shop Now</button>
    </section>

    <!-- Products -->
    <section class="products">
        <div class="card">
            <img src="imagess/bla.webp">
            <h3>Product 1</h3>
            <p>summer t-shirt</p>
            <p>Rs:900</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="imagess/tops.webp">
            <h3>Product 2</h3>
            <p>Summer top</p>
            <p>Rs:600</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="imagess/womens.webp">
            <h3>Product 3</h3>
            <p>summers T-shirts for Girls</p>
            <p>Rs:1000</p>
            <button>Add to Cart</button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyShop</p>
    </footer>

</body>
</html>
